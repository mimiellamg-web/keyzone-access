<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyzone Demo</title>
<style>
body{
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f5f7ff;
}
.card{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.1);
  text-align:center;
  width:350px;
}
input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:15px;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#2b59ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
#msg{
  margin-top:15px;
}
</style>
</head>
<body>

<div class="card">
  <h2>KEYZONE DEMO</h2>

  <p>Code démo : <b>A7K9Q2</b></p>

  <input id="code" placeholder="Entrez le code">

  <button onclick="checkCode()">Valider</button>

  <div id="msg"></div>
</div>

<script>
function checkCode(){

  const code = document.getElementById("code").value.trim();

  if(code==="A7K9Q2"){

    document.getElementById("msg").innerHTML =
    "✅ Code valide. Redirection...";

    setTimeout(function(){

      window.location.href =
      "https://sites.google.com/view/demozone/page-de";

    },1000);

  }else{

    document.getElementById("msg").innerHTML =
    "❌ Code invalide";

  }

}
</script>

</body>
</html>
